<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CINE FOCUS | MOTOR DE PRODUÇÃO</title>
    <style>
        body { background: #050505; color: #fff; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: #121212; padding: 25px; border-radius: 20px; border: 1px solid #444; }
        h1 { color: #ffab40; text-align: center; font-size: 20px; text-transform: uppercase; margin-bottom: 20px; }
        .label-field { display: block; margin-top: 15px; font-size: 11px; color: #ffab40; font-weight: bold; margin-bottom: 5px; }
        textarea { width: 100%; padding: 15px; background: #1a1a1a; border: 1px solid #ffab40; color: #fff; border-radius: 10px; height: 120px; font-size: 14px; box-sizing: border-box; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        select { width: 100%; padding: 10px; background: #1a1a1a; color: #fff; border: 1px solid #333; border-radius: 8px; }
        .btn-prod { width: 100%; padding: 18px; background: #ffab40; color: #000; font-weight: 900; border: none; cursor: pointer; margin-top: 20px; border-radius: 10px; text-transform: uppercase; }
        
        /* Área de Preview e Botões de Ação */
        #preview-area { margin-top: 25px; padding: 15px; background: #000; border: 2px dashed #ffab40; border-radius: 12px; text-align: center; min-height: 250px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #imagem-gerada { max-width: 100%; border-radius: 8px; margin-bottom: 15px; display: none; }
        .action-group { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 15px; width: 100%; }
        .btn-action { padding: 10px; background: #333; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; }
        .btn-action:hover { background: #444; }
    </style>
</head>
<body>
<div class="container">
    <h1>CINE FOCUS | MOTOR DE PRODUÇÃO</h1>
    
    <label class="label-field">O QUE VAMOS CRIAR HOJE?</label>
    <textarea id="prompt" placeholder="Descreva sua estampa..."></textarea>
    
    <div class="controls">
        <select id="tipo-saida">
            <option value="padrao-seamless">Seamless (Repetitivo)</option>
            <option value="arte-isolada">Arte Isolada</option>
            <option value="estilo-3d">Estilo 3D/Cartoon</option>
        </select>
        <select id="formato">
            <option value="PNG">PNG</option>
            <option value="JPG">JPG</option>
            <option value="TIFF">TIFF</option>
        </select>
    </div>

    <button class="btn-prod" onclick="gerarEstampa()">GERAR ARTE AUTÔNOMA</button>
    
    <div id="preview-area">
        <img id="imagem-gerada" src="" alt="Sua arte">
        <p id="status-text" style="color:#666;">Aguardando o comando...</p>
        
        <div class="action-group" id="botoes-acao" style="display:none;">
            <button class="btn-action" onclick="baixarImagem()">BAIXAR</button>
            <button class="btn-action" onclick="window.location.href='mailto:?subject=Minha Estampa'">EXPORTAR</button>
            <button class="btn-action" onclick="window.print()">IMPRIMIR</button>
        </div>
    </div>
</div>

<script>
    async function gerarEstampa() {
        const promptText = document.getElementById('prompt').value;
        const status = document.getElementById('status-text');
        const imgElement = document.getElementById('imagem-gerada');
        const botoes = document.getElementById('botoes-acao');
        
        if(!promptText) { alert("Deni, descreva o que deseja criar."); return; }

        status.innerText = "Processando criação...";
        imgElement.style.display = 'none';
        botoes.style.display = 'none';

        try {
            const response = await fetch('/api/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: promptText })
            });

            const data = await response.json();

            if (response.ok && data.imageUrl) {
                imgElement.src = data.imageUrl;
                imgElement.style.display = 'block';
                status.innerText = "Arte gerada com sucesso!";
                botoes.style.display = 'grid';
            } else {
                status.innerText = "Erro na geração: " + (data.error || "Tente novamente");
            }
        } catch (error) {
            status.innerText = "Erro de conexão.";
        }
    }

    function baixarImagem() {
        const img = document.getElementById('imagem-gerada');
        const link = document.createElement('a');
        link.href = img.src;
        link.download = 'CineFocus-Estampa.png';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
</script>
</body>
</html>
