<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CINE FOCUS | ESTÚDIO PRO</title>
    <style>
        body { background: #050505; color: #fff; font-family: 'Segoe UI', sans-serif; padding: 15px; }
        .container { max-width: 600px; margin: auto; background: #121212; padding: 25px; border-radius: 16px; border: 1px solid #333; }
        h1 { color: #ffab40; text-align: center; font-size: 20px; text-transform: uppercase; margin-bottom: 20px; }
        .label-field { display: block; margin-top: 15px; font-size: 11px; color: #ffab40; font-weight: bold; text-transform: uppercase; }
        input, textarea, select { width: 100%; padding: 12px; margin-top: 5px; background: #1a1a1a; border: 1px solid #444; color: #fff; border-radius: 8px; box-sizing: border-box; }
        .row { display: flex; gap: 10px; }
        .row > div { flex: 1; }
        .seamless-box { margin-top: 15px; padding: 10px; background: #1a1a1a; border-radius: 8px; display: flex; align-items: center; justify-content: space-between; border: 1px solid #444; }
        .btn-prod { width: 100%; padding: 18px; background: #ffab40; color: #000; font-weight: bold; border: none; cursor: pointer; margin-top: 25px; border-radius: 8px; font-size: 16px; }
        .btn-vendas { width: 100%; padding: 14px; background: transparent; color: #ffab40; border: 1px solid #ffab40; cursor: pointer; margin-top: 15px; border-radius: 8px; font-size: 14px; }
        
        /* Área de Preview */
        #preview-area { margin-top: 25px; padding: 15px; background: #000; border: 2px dashed #ffab40; border-radius: 12px; text-align: center; min-height: 200px; display: flex; align-items: center; justify-content: center; }
        #preview-area img { max-width: 100%; border-radius: 8px; }
    </style>
</head>
<body>
<div class="container">
    <h1>Estúdio de Estamparia Adaptável Pro</h1>
    
    <label class="label-field">PEDIDO DE ESTAMPA</label>
    <textarea id="prompt" rows="3" placeholder="Ex: Capivarinhas de vestidos lilás..."></textarea>
    
    <label class="label-field">PALETA DE CORES (OPCIONAL)</label>
    <input type="text" id="cores" placeholder="Ex: Tons lilás, rosa fúcsia e creme">

    <div class="seamless-box">
        <label>Padrão Repetitivo (Seamless)</label>
        <input type="checkbox" id="seamless" style="width: auto;">
    </div>

    <div class="row">
        <div>
            <label class="label-field">TAMANHO</label>
            <select id="tamanho"><option>A4</option><option>A3</option><option>A2</option></select>
        </div>
        <div>
            <label class="label-field">FORMATO</label>
            <select id="formato"><option>PNG</option><option>JPG</option><option>SVG</option><option>PDF</option><option>TIFF</option></select>
        </div>
    </div>

    <button class="btn-prod" onclick="produzir()">GERAR ESTAMPA E VISUALIZAR</button>
    
    <!-- ÁREA DE PREVIEW -->
    <label class="label-field" style="margin-top:25px;">VISUALIZAÇÃO DE PRODUÇÃO</label>
    <div id="preview-area">
        <p style="color:#666;">A estampa gerada aparecerá aqui...</p>
    </div>

    <button class="btn-vendas" onclick="window.location.href='https://wa.me/5512981452413'">ASSINATURA CINE FOCUS (PRO)</button>
</div>

<script>
    function produzir() {
        const p = document.getElementById('prompt').value;
        const preview = document.getElementById('preview-area');
        if(!p) { alert("Descreva o pedido de estampa."); return; }
        
        // Simulação do resultado (Aqui você carregará o link da sua imagem gerada pela IA)
        preview.innerHTML = "<p style='color:#ffab40;'>Processando IA... Em breve sua estampa aparecerá aqui com alta definição.</p>";
    }
</script>
</body>
</html>
