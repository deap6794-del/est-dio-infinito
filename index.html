<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Infinito Premium AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0A0A0C; color: #fff; overflow: hidden; }
        .bg-stardust { background-image: radial-gradient(rgba(255, 255, 255, 0.08) 1px, transparent 1px); background-size: 24px 24px; }
        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #0A0A0C; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #2A2A35; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #FF007F; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [activeTab, setActiveTab] = useState('studio');
            const [prompt, setPrompt] = useState('');
            const [isGenerating, setIsGenerating] = useState(false);
            const [generationStep, setGenerationStep] = useState(0);
            const [currentProject, setCurrentProject] = useState(null);
            
            // Bancos Nativos
            const [bancoPaletas, setBancoPaletas] = useState([]);
            const [bancoImagens, setBancoImagens] = useState([]);

            const steps = [
                "Interpretando a engenharia de papelaria imersiva...",
                "Renderizando estética 3D Cartoon ultra-realista 8k...",
                "Costurando rapport infinito para as superfícies...",
                "Vetorizando elementos para topos de bolo em camadas...",
                "Calculando variações de paletas luxuosas...",
                "Finalizando arquivos sem nenhuma edição manual..."
            ];

            const handleGenerate = () => {
                if (!prompt.trim()) return;
                setIsGenerating(true);
                setGenerationStep(0);
                setCurrentProject(null);

                let step = 0;
                const interval = setInterval(() => {
                    step++;
                    if (step < steps.length) {
                        setGenerationStep(step);
                    } else {
                        clearInterval(interval);
                        finishGeneration();
                    }
                }, 1200);
            };

            const finishGeneration = () => {
                setIsGenerating(false);
                const baseHue = Math.random() * 360;
                
                const newProject = {
                    id: Date.now(),
                    title: prompt,
                    date: new Date().toLocaleDateString('pt-BR'),
                    mainPattern: `hsl(${baseHue}, 80%, 20%)`,
                    coord1: `hsl(${baseHue + 30}, 60%, 15%)`,
                    coord2: `hsl(${baseHue - 30}, 70%, 25%)`,
                    palette: [
                        { hex: '#FF007F', rgb: '255, 0, 127', cmyk: '0, 100, 50, 0' },
                        { hex: '#9D4EDD', rgb: '157, 78, 221', cmyk: '28, 64, 0, 13' },
                        { hex: '#101014', rgb: '16, 16, 20', cmyk: '20, 20, 0, 92' },
                        { hex: '#D4AF37', rgb: '212, 175, 55', cmyk: '0, 17, 74, 17' } // Ouro Luxo
                    ],
                    elements: [1, 2, 3, 4]
                };
                setCurrentProject(newProject);
                setBancoImagens([newProject, ...bancoImagens]);
            };

            const savePalette = (palette) => {
                const novaPaleta = { id: Date.now(), colors: palette, origin: currentProject.title };
                setBancoPaletas([novaPaleta, ...bancoPaletas]);
                alert("Paleta salva com sucesso no seu Banco de Paletas!");
            };

            return (
                <div className="flex h-screen w-full">
                    
                    {/* Sidebar */}
                    <aside className="w-72 bg-[#121215] border-r border-white/5 flex flex-col z-20 shadow-[4px_0_24px_rgba(0,0,0,0.5)]">
                        <div className="p-6 border-b border-white/5 flex items-center gap-4">
                            <div className="w-12 h-12 rounded-xl bg-gradient-to-tr from-purple-600 to-pink-500 flex items-center justify-center text-white font-bold text-2xl shadow-[0_0_20px_rgba(255,0,127,0.4)]">
                                ∞
                            </div>
                            <div>
                                <h1 className="font-black text-[13px] tracking-widest text-white leading-tight">STUDIO INFINITO</h1>
                                <p className="text-[10px] font-bold text-pink-500 tracking-widest uppercase mt-0.5">Premium AI</p>
                            </div>
                        </div>

                        <nav className="flex-1 p-5 space-y-3 mt-2 overflow-y-auto custom-scrollbar">
                            <p className="text-[10px] font-bold text-gray-500 mb-2 px-2 uppercase tracking-widest">Motor de Geração</p>
                            <button 
                                onClick={() => setActiveTab('studio')}
                                className={`w-full flex items-center gap-3 px-4 py-3.5 rounded-xl text-sm font-bold transition-all ${activeTab === 'studio' ? 'bg-gradient-to-r from-purple-900/40 to-pink-900/20 text-pink-400 border border-pink-500/30 shadow-[0_0_15px_rgba(255,0,127,0.1)]' : 'text-gray-400 hover:bg-white/5 hover:text-white'}`}
                            >
                                <span className="text-lg">✦</span> Studio Criativo
                            </button>

                            <div className="pt-6 pb-2">
                                <p className="text-[10px] font-bold text-gray-500 px-2 uppercase tracking-widest">Seus Bancos Nativos</p>
                            </div>
                            <button 
                                onClick={() => setActiveTab('palettes')}
                                className={`w-full flex items-center gap-3 px-4 py-3.5 rounded-xl text-sm font-bold transition-all ${activeTab === 'palettes' ? 'bg-gradient-to-r from-purple-900/40 to-pink-900/20 text-pink-400 border border-pink-500/30' : 'text-gray-400 hover:bg-white/5 hover:text-white'}`}
                            >
                                <span className="text-lg">⊞</span> Banco de Paletas
                            </button>
                            <button 
                                onClick={() => setActiveTab('creations')}
                                className={`w-full flex items-center gap-3 px-4 py-3.5 rounded-xl text-sm font-bold transition-all ${activeTab === 'creations' ? 'bg-gradient-to-r from-purple-900/40 to-pink-900/20 text-pink-400 border border-pink-500/30' : 'text-gray-400 hover:bg-white/5 hover:text-white'}`}
                            >
                                <span className="text-lg">♡</span> Minhas Criações
                            </button>
                        </nav>
                        
                        <div className="p-5 m-5 bg-[#0A0A0C] border border-white/10 rounded-2xl relative overflow-hidden group">
                            <div className="absolute inset-0 bg-gradient-to-r from-purple-600/20 to-pink-600/20 opacity-50 group-hover:opacity-100 transition-opacity"></div>
                            <div className="relative z-10 flex flex-col items-center text-center">
                                <p className="text-xs font-black text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-400 mb-1 tracking-widest uppercase">Plano Master</p>
                                <p className="text-[10px] text-gray-400 font-medium">Autonomia Total 100% IA</p>
                            </div>
                        </div>
                    </aside>

                    {/* Área Principal */}
                    <main className="flex-1 bg-stardust relative overflow-y-auto custom-scrollbar h-full">
                        <div className="max-w-6xl mx-auto p-8 lg:p-14">
                            
                            {/* ABA: STUDIO CRIATIVO */}
                            {activeTab === 'studio' && (
                                <div>
                                    {!isGenerating && !currentProject && (
                                        <div className="min-h-[75vh] flex flex-col items-center justify-center text-center max-w-3xl mx-auto animate-in fade-in duration-500">
                                            <div className="w-24 h-24 bg-[#1A1A24] border border-purple-500/30 shadow-[0_0_40px_rgba(157,78,221,0.2)] rounded-3xl flex items-center justify-center mb-10 relative">
                                                <div className="absolute inset-0 bg-gradient-to-tr from-purple-600 to-pink-500 rounded-3xl blur-2xl opacity-20"></div>
                                                <span className="text-pink-400 text-5xl z-10">✦</span>
                                            </div>
                                            <h2 className="text-5xl font-black text-white mb-6 tracking-tight leading-tight">Engenharia Criativa <br/><span className="text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-500">Por Inteligência Artificial</span></h2>
                                            <p className="text-lg text-gray-400 mb-12 leading-relaxed font-light">
                                                Zero templates. Zero edição manual. Apenas descreva sua visão para a Papelaria Fina de Luxo e a IA criará uma coleção exclusiva em estética 3D Cartoon e resolução 8k.
                                            </p>

                                            <div className="w-full bg-[#121215] p-4 rounded-[2rem] shadow-2xl border border-white/10 focus-within:border-pink-500/50 focus-within:shadow-[0_0_30px_rgba(255,0,127,0.15)] transition-all flex flex-col relative z-20">
                                                <textarea 
                                                    className="w-full bg-transparent p-4 outline-none resize-none text-white placeholder-gray-600 text-xl font-light"
                                                    rows="4"
                                                    placeholder="Ex: Coleção Jardim Secreto, tons pastéis com detalhes em ouro. Elementos florais em 3D Cartoon ultra-realista para topos de bolo em camadas..."
                                                    value={prompt}
                                                    onChange={(e) => setPrompt(e.target.value)}
                                                ></textarea>
                                                <div className="flex justify-between items-center p-2 mt-4 border-t border-white/5 pt-4">
                                                    <div className="flex gap-2">
                                                        <span className="text-[10px] font-bold uppercase tracking-widest bg-purple-900/30 text-purple-400 border border-purple-500/20 px-4 py-2 rounded-full">100% IA</span>
                                                        <span className="text-[10px] font-bold uppercase tracking-widest bg-pink-900/30 text-pink-400 border border-pink-500/20 px-4 py-2 rounded-full">Ultra-realista 8k</span>
                                                    </div>
                                                    <button 
                                                        onClick={handleGenerate}
                                                        disabled={!prompt.trim()}
                                                        className="bg-gradient-to-r from-purple-600 to-pink-500 hover:from-purple-500 hover:to-pink-400 text-white px-10 py-4 rounded-full font-bold text-sm tracking-widest uppercase transition-all disabled:opacity-50 disabled:grayscale shadow-[0_0_20px_rgba(255,0,127,0.3)]"
                                                    >
                                                        Materializar
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    {isGenerating && (
                                        <div className="min-h-[75vh] flex flex-col items-center justify-center animate-in fade-in duration-300">
                                            <div className="relative w-48 h-48 mb-12">
                                                <div className="absolute inset-0 bg-gradient-to-r from-purple-600 to-pink-500 rounded-full animate-ping opacity-20"></div>
                                                <div className="absolute inset-2 bg-[#0A0A0C] rounded-full z-10 border border-purple-500/30 flex items-center justify-center">
                                                    <div className="absolute inset-0 bg-gradient-to-tr from-purple-600 to-pink-500 rounded-full animate-spin opacity-20 blur-lg"></div>
                                                    <span className="text-pink-400 animate-pulse z-20 text-6xl">✦</span>
                                                </div>
                                            </div>
                                            <h3 className="text-3xl font-black text-white mb-4 tracking-tight">Construindo Pixels</h3>
                                            <p className="text-pink-400 font-medium h-8 text-lg">{steps[generationStep]}</p>
                                            
                                            <div className="w-80 h-2 bg-[#121215] rounded-full mt-10 overflow-hidden border border-white/5">
                                                <div 
                                                    className="h-full bg-gradient-to-r from-purple-500 to-pink-500 transition-all duration-1000 ease-out shadow-[0_0_15px_#FF007F]"
                                                    style={{ width: `${((generationStep + 1) / steps.length) * 100}%` }}
                                                ></div>
                                            </div>
                                        </div>
                                    )}

                                    {!isGenerating && currentProject && (
                                        <div className="animate-in fade-in slide-in-from-bottom-10 duration-700">
                                            <div className="flex justify-between items-end mb-10 border-b border-white/10 pb-8">
                                                <div>
                                                    <p className="text-xs font-bold text-pink-500 uppercase tracking-widest mb-3">✦ Coleção Exclusiva Gerada</p>
                                                    <h2 className="text-4xl font-black text-white capitalize">{currentProject.title}</h2>
                                                </div>
                                                <button onClick={() => {setPrompt(''); setCurrentProject(null);}} className="text-sm font-bold text-gray-400 hover:text-pink-400 transition-colors uppercase tracking-widest bg-white/5 px-6 py-3 rounded-full border border-white/10 hover:border-pink-500/50">
                                                    Nova Geração
                                                </button>
                                            </div>

                                            <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                                                <div className="lg:col-span-8 space-y-8">
                                                    <div className="bg-[#121215] p-6 rounded-[2rem] border border-white/5 shadow-2xl relative overflow-hidden">
                                                        <div className="absolute -top-32 -right-32 w-96 h-96 bg-purple-600/20 blur-[100px] rounded-full pointer-events-none"></div>
                                                        <div className="flex items-center justify-between mb-6 relative z-10">
                                                            <h3 className="font-bold text-white text-lg">Estampa Principal (Rapport Infinito)</h3>
                                                            <button className="bg-white/5 text-white border border-white/10 px-5 py-2.5 rounded-xl text-xs font-bold hover:bg-gradient-to-r hover:from-purple-600 hover:to-pink-500 transition-all hover:border-transparent uppercase tracking-wider">
                                                                ⬇ Baixar 8k
                                                            </button>
                                                        </div>
                                                        <div className="w-full h-[450px] rounded-2xl shadow-inner border border-white/5 relative" style={{ backgroundColor: currentProject.mainPattern }}>
                                                             <div className="absolute inset-0 opacity-30" style={{ backgroundImage: `radial-gradient(circle at 20% 30%, rgba(255,255,255,0.2) 0%, transparent 50%), radial-gradient(circle at 80% 70%, rgba(0,0,0,0.4) 0%, transparent 50%)` }}></div>
                                                        </div>
                                                    </div>

                                                    <div className="grid grid-cols-2 gap-8">
                                                        <div className="bg-[#121215] p-6 rounded-[2rem] border border-white/5 shadow-2xl">
                                                            <h3 className="font-bold text-white mb-5 text-sm uppercase tracking-widest text-gray-400">Coordenada A</h3>
                                                            <div className="h-40 rounded-xl border border-white/5" style={{ backgroundColor: currentProject.coord1 }}></div>
                                                        </div>
                                                        <div className="bg-[#121215] p-6 rounded-[2rem] border border-white/5 shadow-2xl">
                                                            <h3 className="font-bold text-white mb-5 text-sm uppercase tracking-widest text-gray-400">Coordenada B</h3>
                                                            <div className="h-40 rounded-xl border border-white/5" style={{ backgroundColor: currentProject.coord2 }}></div>
                                                        </div>
                                                    </div>
                                                </div>

                                                <div className="lg:col-span-4 space-y-8">
                                                    <div className="bg-[#121215] p-8 rounded-[2rem] border border-white/5 shadow-2xl relative overflow-hidden">
                                                        <div className="absolute -bottom-20 -left-20 w-64 h-64 bg-pink-600/10 blur-[80px] rounded-full pointer-events-none"></div>
                                                        <div className="flex justify-between items-center mb-8 relative z-10">
                                                            <h3 className="font-bold text-white text-lg">Paleta de Luxo</h3>
                                                            <button onClick={() => savePalette(currentProject.palette)} className="text-[10px] uppercase tracking-widest font-bold text-pink-400 hover:text-white transition-colors bg-pink-500/10 px-4 py-2 rounded-lg border border-pink-500/20">
                                                                Salvar no Banco
                                                            </button>
                                                        </div>
                                                        <div className="space-y-5 relative z-10">
                                                            {currentProject.palette.map((color, idx) => (
                                                                <div key={idx} className="flex items-center gap-5">
                                                                    <div className="w-14 h-14 rounded-2xl shadow-lg border border-white/10" style={{ backgroundColor: color.hex }}></div>
                                                                    <div>
                                                                        <p className="text-sm font-black text-white uppercase tracking-wider">{color.hex}</p>
                                                                        <p className="text-[10px] font-medium text-gray-500 mt-1">CMYK: {color.cmyk}</p>
                                                                    </div>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    </div>

                                                    <div className="bg-[#121215] p-8 rounded-[2rem] border border-white/5 shadow-2xl">
                                                        <h3 className="font-bold text-white text-lg mb-6 leading-tight">Elementos Isolados <br/><span className="text-[11px] text-gray-400 uppercase tracking-widest font-normal">(Engenharia 3D)</span></h3>
                                                        <div className="grid grid-cols-2 gap-4">
                                                            {currentProject.elements.map(el => (
                                                                <div key={el} className="bg-[#1A1A24] aspect-square rounded-2xl border border-white/5 flex items-center justify-center relative group cursor-pointer hover:border-pink-500/50 transition-colors">
                                                                    <span className="text-gray-600 group-hover:text-pink-400 transition-colors">✦</span>
                                                                    <div className="absolute inset-0 bg-black/60 rounded-2xl flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity backdrop-blur-sm">
                                                                        <span className="text-[10px] font-bold text-white uppercase tracking-widest">PNG Transp.</span>
                                                                    </div>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            )}

                            {/* ABA: BANCO DE PALETAS */}
                            {activeTab === 'palettes' && (
                                <div className="animate-in fade-in slide-in-from-right-8 duration-500">
                                    <div className="mb-12">
                                        <h2 className="text-4xl font-black text-white mb-3">Banco de Paletas</h2>
                                        <p className="text-gray-400 font-light text-lg">Suas composições de cores salvas a partir do Motor de Geração.</p>
                                    </div>

                                    {bancoPaletas.length === 0 ? (
                                        <div className="text-center py-32 bg-[#121215] rounded-[2rem] border border-white/5 border-dashed">
                                            <span className="text-6xl text-gray-800 mb-6 block">⊞</span>
                                            <p className="text-gray-400 font-medium text-xl">Nenhuma paleta salva ainda.</p>
                                            <p className="text-sm text-gray-600 mt-2 font-light">Gere uma coleção no Studio Criativo para extrair cores.</p>
                                        </div>
                                    ) : (
                                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                                            {bancoPaletas.map(paleta => (
                                                <div key={paleta.id} className="bg-[#121215] p-8 rounded-[2rem] border border-white/5 shadow-2xl hover:border-pink-500/30 transition-colors">
                                                    <p className="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-6">Origem: <span className="text-pink-400">{paleta.origin.substring(0, 20)}...</span></p>
                                                    <div className="flex h-24 rounded-2xl overflow-hidden mb-6 shadow-inner border border-white/10">
                                                        {paleta.colors.map((c, i) => (
                                                            <div key={i} className="flex-1" style={{ backgroundColor: c.hex }}></div>
                                                        ))}
                                                    </div>
                                                    <div className="grid grid-cols-2 gap-3">
                                                        {paleta.colors.slice(0,4).map((c, i) => (
                                                            <div key={i} className="bg-[#1A1A24] p-3 rounded-xl border border-white/5">
                                                                <p className="font-black text-xs text-white tracking-wider">{c.hex}</p>
                                                                <p className="text-gray-500 text-[9px] mt-1 uppercase">CMYK: {c.cmyk}</p>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            )}

                            {/* ABA: MINHAS CRIAÇÕES */}
                            {activeTab === 'creations' && (
                                <div className="animate-in fade-in slide-in-from-right-8 duration-500">
                                    <div className="mb-12 flex justify-between items-end border-b border-white/10 pb-8">
                                        <div>
                                            <h2 className="text-4xl font-black text-white mb-3">Minhas Criações</h2>
                                            <p className="text-gray-400 font-light text-lg">Repositório exclusivo das suas gerações. Zero estampas de terceiros.</p>
                                        </div>
                                    </div>

                                    {bancoImagens.length === 0 ? (
                                        <div className="text-center py-32 bg-[#121215] rounded-[2rem] border border-white/5 border-dashed">
                                            <span className="text-6xl text-gray-800 mb-6 block">♡</span>
                                            <p className="text-gray-400 font-medium text-xl">O seu banco está vazio.</p>
                                            <button 
                                                onClick={() => setActiveTab('studio')}
                                                className="mt-6 text-[11px] font-bold uppercase tracking-widest text-pink-400 border border-pink-500/30 px-6 py-3 rounded-full hover:bg-pink-500/10 transition-colors"
                                            >
                                                Ir para o Studio Criativo
                                            </button>
                                        </div>
                                    ) : (
                                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                                            {bancoImagens.map(img => (
                                                <div key={img.id} className="bg-[#121215] group rounded-[2rem] overflow-hidden border border-white/5 shadow-2xl hover:border-pink-500/50 transition-all cursor-pointer">
                                                    <div className="h-56 relative" style={{ backgroundColor: img.mainPattern }}>
                                                        <div className="absolute inset-0 bg-black/0 group-hover:bg-black/40 transition-all flex items-center justify-center backdrop-blur-[0px] group-hover:backdrop-blur-sm">
                                                            <div className="opacity-0 group-hover:opacity-100 transform translate-y-4 group-hover:translate-y-0 transition-all duration-300">
                                                                <button className="bg-white text-black font-black text-[10px] uppercase tracking-widest px-6 py-3 rounded-full shadow-[0_0_20px_rgba(255,255,255,0.3)]">Abrir Coleção</button>
                                                            </div>
                                                        </div>
                                                    </div>
                                                    <div className="p-6">
                                                        <p className="text-[10px] text-gray-500 font-bold uppercase tracking-widest mb-2">{img.date}</p>
                                                        <h3 className="font-bold text-white text-xl capitalize mb-4 line-clamp-1">{img.title}</h3>
                                                        <div className="flex gap-2">
                                                            <span className="text-[9px] font-bold uppercase tracking-widest px-3 py-1.5 bg-[#1A1A24] text-gray-400 rounded-md border border-white/5">Principal</span>
                                                            <span className="text-[9px] font-bold uppercase tracking-widest px-3 py-1.5 bg-[#1A1A24] text-gray-400 rounded-md border border-white/5">2 Coord.</span>
                                                            <span className="text-[9px] font-bold uppercase tracking-widest px-3 py-1.5 bg-[#1A1A24] text-gray-400 rounded-md border border-white/5">Elementos</span>
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            )}

                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
