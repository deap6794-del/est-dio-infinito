<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ESTÚDIO INFINITO | SOBERANIA DE PROMPT</title>
    <style>
        body { background: #080808; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .container { max-width: 950px; margin: auto; background: #121212; padding: 30px; border-radius: 12px; }
        h1 { color: #ffab40; text-align: center; text-transform: uppercase; letter-spacing: 2px; }
        label { display: block; margin: 15px 0 5px; color: #ffab40; font-size: 12px; }
        input, textarea, select { width: 100%; padding: 12px; background: #252525; border: 1px solid #444; color: #fff; margin-bottom: 10px; }
        button { width: 100%; padding: 15px; background: #ffab40; color: #000; font-weight: bold; cursor: pointer; border: none; }
        #visor-preview { width: 100%; min-height: 450px; border: 2px dashed #444; margin-top: 20px; display: flex; align-items: center; justify-content: center; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <h1>ESTÚDIO INFINITO</h1>
        
        <label>SUPERFÍCIE DE APLICAÇÃO</label>
        <input type="text" id="superficie" placeholder="Ex: Pratos, Guardanapos, Azulejo, Tecidos...">
        
        <label>IDEIA DE ESTAMPA (PROMPT INFINITO)</label>
        <textarea id="prompt" rows="4" placeholder="Descreva sua estampa..."></textarea>
        
        <label>PALETA DE CORES INFINITAS</label>
        <input type="text" id="paleta" placeholder="Ex: Dourado, Rosé, Ouro Velho ou INFINITA">
        
        <label>FORMATO DE SAÍDA</label>
        <select id="formato">
            <option>A4</option><option>A3</option><option>PNG</option><option>JPG</option><option>SVG</option><option>PDF</option><option>TIFF</option>
        </select>
        
        <button onclick="gerar()">GERAR ESTAMPA E DESIGN</button>
        
        <div id="visor-preview">VISOR PREVIEW - AGUARDANDO COMANDO</div>
        
        <button style="background:#333; color:#fff; margin-top:10px;" onclick="window.print()">IMPRIMIR / EXPORTAR ARQUIVO</button>
    </div>

    <script>
        function gerar() {
            const s = document.getElementById('superficie').value;
            const p = document.getElementById('prompt').value;
            const c = document.getElementById('paleta').value;
            document.getElementById('visor-preview').innerText = "CALIBRANDO: " + s + "\nPROMPT: " + p + "\nPALETA: " + c + "\n\nSISTEMA PRONTO PARA PRODUÇÃO.";
        }
    </script>
</body>
</html>
