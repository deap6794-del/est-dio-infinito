<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sovereignty Studio Infinite</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#0b0b0d;
color:white;
display:flex;
height:100vh;
}

.sidebar{
width:280px;
background:#111216;
padding:20px;
overflow-y:auto;
border-right:1px solid #222;
}

.logo{
font-size:28px;
font-weight:bold;
margin-bottom:30px;
}

.menu button{
width:100%;
padding:14px;
margin-bottom:10px;
background:#1b1c22;
border:none;
border-radius:10px;
color:white;
cursor:pointer;
text-align:left;
}

.menu button:hover{
background:#292b33;
}

.main{
flex:1;
padding:30px;
overflow-y:auto;
}

.card{
background:#15161b;
padding:20px;
border-radius:16px;
margin-bottom:20px;
}

h2{
margin-bottom:15px;
}

textarea{
width:100%;
height:120px;
background:#0f1014;
border:1px solid #333;
color:white;
padding:15px;
border-radius:10px;
resize:none;
}

select{
width:100%;
padding:12px;
background:#0f1014;
color:white;
border:1px solid #333;
border-radius:10px;
margin-top:10px;
}

.generate{
margin-top:20px;
padding:15px;
width:100%;
background:#ff9800;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

.generate:hover{
opacity:0.9;
}

.preview{
height:400px;
border:2px dashed #444;
border-radius:16px;
display:flex;
justify-content:center;
align-items:center;
font-size:20px;
color:#777;
}

.palette{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:10px;
margin-top:15px;
}

.color{
height:50px;
border-radius:10px;
}

</style>
</head>

<body>

<div class="sidebar">

<div class="logo">
Sovereignty Studio Infinite
</div>

<div class="menu">

<button>Dashboard</button>
<button>Criar Estampa</button>
<button>Coleções</button>
<button>Engenharia Reversa</button>
<button>Papéis Digitais</button>
<button>Superfícies</button>
<button>Mockups</button>
<button>Paletas</button>
<button>Exportações</button>
<button>Marketplace</button>

</div>

</div>

<div class="main">

<div class="card">

<h2>Descreva sua Estampa</h2>

<textarea placeholder="Ex: Floral aquarela azul e dourado para papelaria de luxo"></textarea>

<select>

<option>Papel Digital</option>
<option>Scrapbook</option>
<option>Convite</option>
<option>Tecido Algodão</option>
<option>Caneca Cerâmica</option>
<option>Azulejo</option>
<option>Mouse Pad</option>
<option>Boné</option>
<option>Almofada</option>
<option>Madeira</option>
<option>Vidro</option>
<option>Metal</option>

</select>

<button class="generate">
GERAR ESTAMPA
</button>

</div>

<div class="card">

<h2>Banco de Paletas Infinitas</h2>

<div class="palette">

<div class="color" style="background:#D4AF37;"></div>
<div class="color" style="background:#0A2342;"></div>
<div class="color" style="background:#F8F4E3;"></div>
<div class="color" style="background:#B76E79;"></div>
<div class="color" style="background:#2E4057;"></div>

</div>

</div>

<div class="card">

<h2>Resultado da IA</h2>

<div class="preview">
A estampa gerada aparecerá aqui
</div>

</div>

</div>

</body>
</html>
