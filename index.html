<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Estamparia</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-bold text-gray-800 mb-6">Painel de Produção</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- Menu de Superfícies -->
            <div class="md:col-span-1 bg-white p-4 rounded-xl shadow-sm border border-gray-200">
                <h2 class="font-semibold text-gray-700 mb-4">Superfícies</h2>
                <div id="lista-superficies" class="space-y-2"></div>
            </div>

            <!-- Área de Visualização (O "Sistema" funcionando) -->
            <div class="md:col-span-2 bg-white p-8 rounded-xl shadow-sm border border-gray-200">
                <div id="painel-conteudo">
                    <h2 class="text-2xl font-bold text-gray-800">Bem-vindo</h2>
                    <p class="text-gray-600 mt-2">Selecione uma superfície na lista ao lado para carregar as configurações de estamparia.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Banco de dados do seu sistema
        const dados = {
            "Papel Digital": { temp: "180°C", tempo: "30s", obs: "Use papel específico para sublimação." },
            "Scrapbook": { temp: "150°C", tempo: "15s", obs: "Cuidado com a espessura do papel." },
            "MDF": { temp: "200°C", tempo: "60s", obs: "Necessário retirar a película protetora." },
            "Caneca": { temp: "190°C", tempo: "180s", obs: "Verifique a pressão da prensa." }
            // Adicione os outros itens aqui seguindo o mesmo padrão...
        };

        const listaDiv = document.getElementById('lista-superficies');
        const painel = document.getElementById('painel-conteudo');
        const superfices = ["Papel Digital", "Scrapbook", "Papelaria", "MDF", "Madeira", "Vidro", "Cerâmica", "Papel de Parede", "Caneca", "Copo", "Bolsa", "Mochila", "Boné", "Embalagem"];

        superfices.forEach(nome => {
            const btn = document.createElement('button');
            btn.className = "w-full text-left p-3 rounded-lg hover:bg-blue-50 transition border border-gray-100";
            btn.innerText = nome;
            btn.onclick = () => carregarSistema(nome);
            listaDiv.appendChild(btn);
        });

        function carregarSistema(item) {
            const info = dados[item] || { temp: "N/A", tempo: "N/A", obs: "Configuração não cadastrada." };
            painel.innerHTML = `
                <h2 class="text-3xl font-bold text-blue-600">${item}</h2>
                <div class="mt-6 grid grid-cols-2 gap-4">
                    <div class="bg-gray-50 p-4 rounded-lg"><span class="block text-gray-500">Temperatura</span><strong class="text-xl">${info.temp}</strong></div>
                    <div class="bg-gray-50 p-4 rounded-lg"><span class="block text-gray-500">Tempo</span><strong class="text-xl">${info.tempo}</strong></div>
                </div>
                <div class="mt-6 p-4 bg-yellow-50 border-l-4 border-yellow-400">
                    <p class="text-yellow-800"><strong>Dica:</strong> ${info.obs}</p>
                </div>
            `;
        }
    </script>
</body>
</html>
