<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ESTÚDIO INFINITO | Soberania de Prompt</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { background: #080808; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .container { max-width: 950px; margin: auto; background: #121212; padding: 30px; border-radius: 20px; border: 1px solid #333; }
        h1 { color: #ffab40; text-align: center; text-transform: uppercase; letter-spacing: 2px; }
        input, textarea, select, button { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 10px; background: #1a1a1a; color: #fff; border: 1px solid #444; font-size: 16px; }
        button { background: #ffab40; color: #000; font-weight: bold; cursor: pointer; transition: 0.3s; border: none; }
        button:hover { background: #e09230; transform: translateY(-2px); }
        #visor-preview { width: 100%; min-height: 450px; border: 2px dashed #444; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; border-radius: 15px; background: #000; overflow: hidden; color: #666; }
    </style>
</head>
<body>

<div class="container" id="login-area">
    <h1>ESTÚDIO INFINITO</h1>
    <input type="password" id="senha-acesso" placeholder="Senha de Acesso">
    <input type="password" id="api-key" placeholder="Insira sua Chave OpenAI">
    <button onclick="liberarAcesso()">ENTRAR NA FÁBRICA</button>
</div>

<div class="container" id="studio-area" style="display:none;">
    <h1>Gerador de Estampas de Luxo</h1>
    <textarea id="prompt-criativo" rows="3" placeholder="Ex: Estampa floral para móveis, estilo 3D Cartoon Pixar..."></textarea>
    
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
        <select id="material">
            <option value="Papelaria Fina de Luxo (Couchê/Vegetal/Color Plus)">Papelaria Fina de Luxo</option>
            <option value="Engenharia de Papel Imersiva (Estruturas 3D)">Engenharia de Papel 3D</option>
            <option value="Tecidos e Vestuário Premium">Tecidos e Vestuário</option>
            <option value="Cenografia e Gift Packaging (Cine Focus Lab)">Cenografia/Packaging</option>
            <option value="Cerâmica e Vidro">Cerâmica/Vidro</option>
            <option value="Madeira e MDF">Madeira/MDF</option>
            <option value="Metais e Superfícies Acrílicas">Metais/Acrílicos</option>
        </select>
        <select id="formato">
            <option>Ultra-realistic cinematic 8k</option>
            <option>Acabamento Metálico/Foil Premium</option>
        </select>
    </div>

    <button onclick="criarEstampa()">EXECUTAR ENGENHARIA DE PROMPT</button>
    
    <div id="visor-preview">O estúdio está aguardando sua visão...</div>
    
    <button onclick="baixarArquivo()">SALVAR ARTE FINAL (PNG)</button>
</div>

<script>
    function liberarAcesso() {
        if(document.getElementById('senha-acesso').value === "SUA_SENHA_AQUI") {
            document.getElementById('login-area').style.display = 'none';
            document.getElementById('studio-area').style.display = 'block';
        } else { alert("Acesso negado."); }
    }

    async function criarEstampa() {
        const apiKey = document.getElementById('api-key').value;
        const ideia = document.getElementById('prompt-criativo').value;
        const material = document.getElementById('material').value;
        const formato = document.getElementById('formato').value;
        const visor = document.getElementById('visor-preview');
        
        visor.innerText = "Processando engenharia reversa e restauração máxima...";

        const promptEngenharia = `Obra-prima de design: ${ideia}. Contexto: ${material}. Estilo: ${formato}. Estética 3D Cartoon, iluminação volumétrica, ultra-detalhado, renderização de estúdio, texturas premium, foco em resolução 8k e clareza visual absoluta.`;

        try {
            const response = await fetch('https://api.openai.com/v1/images/generations', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
                body: JSON.stringify({ model: "dall-e-3", prompt: promptEngenharia, n: 1, size: "1024x1024" })
            });
            const data = await response.json();
            visor.innerHTML = `<img src="${data.data[0].url}" style="width:100%; border-radius:10px;">`;
        } catch(e) {
            visor.innerText = "Erro na geração. Verifique sua chave API.";
        }
    }

    function baixarArquivo() {
        html2canvas(document.querySelector("#visor-preview")).then(canvas => {
            let link = document.createElement('a');
            link.download = 'Estudio_Infinito_Arte.png';
            link.href = canvas.toDataURL("image/png");
            link.click();
        });
    }
</script>
</body>
</html>
